<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Prática - JavaScript Tradicional</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: black;
            color: #BF9DDF;
            margin: 20px;
        }
        button {
            padding: 8px 12px;
            background: #BF9DDF;
            color: black;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            margin: 5px;
        }
        h1 {
            color: #BF9DDF;
        }
    </style>
</head>
<body>
    <h1 id="titulo">Título original</h1>
    <button onclick="alterar()">Alterar</button>
    <button onclick="voltar()">Voltar</button>

    <p id="p1">Item 1</p>
    <p id="p2">Item 2</p>
    <p id="p3">Item 3</p>

    <script>
        function alterar() {
            document.getElementById("titulo").innerText = "Novo título";
            document.getElementById("p1").innerText = "Alterado";
            document.getElementById("p2").innerText = "Alterado";
            document.getElementById("p3").innerText = "Alterado";
        }

        function voltar() {
            document.getElementById("titulo").innerText = "Título original";
            document.getElementById("p1").innerText = "Item 1";
            document.getElementById("p2").innerText = "Item 2";
            document.getElementById("p3").innerText = "Item 3";
        }
    </script>

    <footer style="text-align: center; margin-top: 600px; color: #BF9DDF; font-size: 14px;">
        PUC - GO 2026<br>
        Atividade prática - biblioteca react<br>
        Aluna: Roberta Souza Silva<br>
        Professor: Thalles Bruno Gonçalves
    </footer>
</body>
</html>
